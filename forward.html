<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flobro</title>
  <style>
    body {
      width: 340px; margin: 0; padding: 16px 18px;
      font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #16324a; background: #f7fafd;
    }
    .note { color: #4d6274; margin-bottom: 12px; }
    .q { font-weight: 700; margin-bottom: 8px; }
    .row { display: flex; gap: 8px; }
    button {
      border: 0; padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font: inherit; font-weight: 600;
    }
    .yes { background: #248bd2; color: #fff; }
    .no { background: #fff; color: #1668a8; border: 1.5px solid #c4dcef; }
    iframe { display: none; }
  </style>
</head>
<body>
  <div id="confirm" hidden>
    <div class="q" data-msg="confirmQ"></div>
    <div class="row">
      <button type="button" class="yes" id="confirm-yes" data-msg="confirmYes"></button>
      <button type="button" class="no" id="confirm-no" data-msg="confirmNo"></button>
    </div>
    <p class="note" data-msg="getAppNote" style="margin-top: 12px; margin-bottom: 0;"></p>
  </div>
  <iframe id="applink" title="deep link"></iframe>
  <script src="shared.js"></script>
  <script src="forward.js"></script>
</body>
</html>
